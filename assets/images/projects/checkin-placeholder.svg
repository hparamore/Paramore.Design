<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 540" fill="none">
  <rect width="1260" height="540" fill="#111111"/>


  <!-- Phone 1 (left, tilted back slightly) -->
  <g transform="translate(280, 60) rotate(-5, 90, 210)">
    <rect x="0" y="0" width="180" height="380" rx="20" fill="#1A1A1A" stroke="#333333" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="10" y="40" width="160" height="300" rx="4" fill="#0A0A0A"/>
    <!-- Status bar placeholder -->
    <rect x="20" y="50" width="60" height="6" rx="3" fill="#333333"/>
    <rect x="130" y="50" width="30" height="6" rx="3" fill="#333333"/>
    <!-- App content: campfire icon hint -->
    <circle cx="90" cy="140" r="24" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.6"/>
    <path d="M82 148 L90 124 L98 148" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.6"/>
    <!-- User cards -->
    <rect x="24" y="185" width="132" height="28" rx="6" fill="#1A1A1A"/>
    <circle cx="40" cy="199" r="8" fill="#333333"/>
    <rect x="54" y="195" width="50" height="8" rx="4" fill="#333333"/>
    <rect x="24" y="221" width="132" height="28" rx="6" fill="#1A1A1A"/>
    <circle cx="40" cy="235" r="8" fill="#333333"/>
    <rect x="54" y="231" width="40" height="8" rx="4" fill="#333333"/>
    <rect x="24" y="257" width="132" height="28" rx="6" fill="#1A1A1A"/>
    <circle cx="40" cy="271" r="8" fill="#333333"/>
    <rect x="54" y="267" width="56" height="8" rx="4" fill="#333333"/>
    <!-- Notch -->
    <rect x="60" y="8" width="60" height="20" rx="10" fill="#0A0A0A"/>
  </g>

  <!-- Phone 2 (center, straight, slightly larger/forward) -->
  <g transform="translate(500, 30)">
    <rect x="0" y="0" width="200" height="420" rx="24" fill="#1A1A1A" stroke="#444444" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="10" y="44" width="180" height="332" rx="4" fill="#0A0A0A"/>
    <!-- Status bar -->
    <rect x="22" y="54" width="60" height="6" rx="3" fill="#333333"/>
    <rect x="146" y="54" width="30" height="6" rx="3" fill="#333333"/>
    <!-- Group header -->
    <rect x="22" y="76" width="100" height="12" rx="4" fill="#444444"/>
    <!-- Campfire graphic -->
    <circle cx="100" cy="145" r="32" fill="none" stroke="#FF6B00" stroke-width="2.5" opacity="0.8"/>
    <path d="M88 156 L100 126 L112 156" fill="none" stroke="#FF6B00" stroke-width="2.5" opacity="0.8"/>
    <!-- Check-in button -->
    <rect x="42" y="192" width="116" height="32" rx="16" fill="#FF6B00" opacity="0.3"/>
    <rect x="62" y="204" width="76" height="8" rx="4" fill="#FF6B00" opacity="0.5"/>
    <!-- Member list -->
    <rect x="22" y="244" width="156" height="30" rx="8" fill="#1A1A1A"/>
    <circle cx="40" cy="259" r="9" fill="#444444"/>
    <rect x="56" y="254" width="60" height="10" rx="5" fill="#444444"/>
    <rect x="22" y="282" width="156" height="30" rx="8" fill="#1A1A1A"/>
    <circle cx="40" cy="297" r="9" fill="#444444"/>
    <rect x="56" y="292" width="48" height="10" rx="5" fill="#444444"/>
    <rect x="22" y="320" width="156" height="30" rx="8" fill="#1A1A1A"/>
    <circle cx="40" cy="335" r="9" fill="#444444"/>
    <rect x="56" y="330" width="54" height="10" rx="5" fill="#444444"/>
    <!-- Notch -->
    <rect x="64" y="10" width="72" height="22" rx="11" fill="#0A0A0A"/>
  </g>

  <!-- Phone 3 (right, tilted forward slightly) -->
  <g transform="translate(770, 60) rotate(5, 90, 210)">
    <rect x="0" y="0" width="180" height="380" rx="20" fill="#1A1A1A" stroke="#333333" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="10" y="40" width="160" height="300" rx="4" fill="#0A0A0A"/>
    <!-- Profile view hint -->
    <circle cx="90" cy="110" r="28" fill="#1A1A1A"/>
    <rect x="50" y="150" width="80" height="10" rx="5" fill="#333333"/>
    <rect x="60" y="168" width="60" height="6" rx="3" fill="#2A2A2A"/>
    <!-- Settings list -->
    <rect x="20" y="195" width="140" height="24" rx="6" fill="#1A1A1A"/>
    <rect x="20" y="227" width="140" height="24" rx="6" fill="#1A1A1A"/>
    <rect x="20" y="259" width="140" height="24" rx="6" fill="#1A1A1A"/>
    <rect x="20" y="291" width="140" height="24" rx="6" fill="#1A1A1A"/>
    <!-- Notch -->
    <rect x="60" y="8" width="60" height="20" rx="10" fill="#0A0A0A"/>
  </g>

  <!-- Subtle accent glow behind center phone -->
  <ellipse cx="600" cy="480" rx="200" ry="40" fill="#FF6B00" opacity="0.04"/>
</svg>